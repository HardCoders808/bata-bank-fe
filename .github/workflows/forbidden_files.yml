name: Check forbidden files

on:
  pull_request:

jobs:
  no-env-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail on .env files
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.env($|\.|$)' ; then
            echo "❌ .env files are not allowed in this repo."
            exit 1
          fi
