name: Bata Bank FE CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  #######################################################################################################################
  # JOB 1: Build and Verify (Runs on every PR and Push)
  #######################################################################################################################
  verify:
    name: Build and Verify
    runs-on: bata-bank-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Workspace Permissions
        run: sudo chown -R $USER:$USER .

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  #######################################################################################################################
  # JOB 2: Package and Containerize (Only runs after merge to main)
  #######################################################################################################################
  package:
    name: Build and Docker Image
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: bata-bank-runner-set
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Workspace Permissions
        run: sudo chown -R $USER:$USER .

      - name: Verify Docker (DinD Check)
        run: docker ps

      - name: Build Docker Image
        run: |
          docker build -t hardcoders808/bata-bank-fe:${{ github.sha }} .
          docker tag hardcoders808/bata-bank-fe:${{ github.sha }} hardcoders808/bata-bank-fe:latest

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bata-bank-frontend-build
          path: .next/
